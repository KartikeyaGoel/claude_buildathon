services:
  db:
    image: pgvector/pgvector:pg16
    container_name: crucible_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: crucible
      POSTGRES_USER: crucible
      POSTGRES_PASSWORD: crucible_dev
    ports:
      - "5432:5432"
    volumes:
      - crucible_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crucible -d crucible"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  crucible_pgdata: